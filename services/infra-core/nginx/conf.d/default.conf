server {
  listen 80;
  server_name _;
  client_max_body_size 100M;
  resolver 127.0.0.11 valid=10s ipv6=off;

  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location / {
    set $frontend_upstream frontend:3000;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/v1/auth/ {
    set $identity_upstream identity-service:8000;
    proxy_pass http://$identity_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Blueprint compatible path for ai-provider-hub native API.
  location /api/v1/ai/ {
    set $ai_upstream ai-provider-hub:8001;
    proxy_pass http://$ai_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # OpenAI compatible path.
  location /v1/ {
    set $ai_upstream ai-provider-hub:8001;
    proxy_pass http://$ai_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/v1/knowledge/ {
    set $knowledge_upstream knowledge-engine:8002;
    proxy_pass http://$knowledge_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /v1/chat/completions {
    set $ai_upstream ai-provider-hub:8001;
    proxy_pass http://$ai_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_read_timeout 86400s;
    add_header X-Accel-Buffering no always;
  }
}
