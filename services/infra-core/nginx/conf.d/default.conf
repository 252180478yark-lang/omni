upstream frontend_upstream     { server frontend:3000; }
upstream ai_hub_upstream      { server ai-provider-hub:8001; }
upstream knowledge_upstream   { server knowledge-engine:8002; }
upstream news_upstream        { server news-aggregator:8005; }
upstream video_upstream       { server video-analysis:8006; }
upstream livestream_upstream  { server livestream-analysis:8007; }

server {
  listen 80;
  server_name _;
  client_max_body_size 100M;

  # ─── Health ───
  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # ─── Frontend (Next.js :3000) ───
  location / {
    proxy_pass http://frontend_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }

  # ─── AI Provider Hub (:8001) ───
  location /api/v1/ai/ {
    proxy_pass http://ai_hub_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # OpenAI-compatible path
  location /v1/ {
    proxy_pass http://ai_hub_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SSE streaming for chat completions
  location /v1/chat/completions {
    proxy_pass http://ai_hub_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        '';
    proxy_read_timeout 86400s;
    proxy_buffering off;
    add_header X-Accel-Buffering no always;
  }

  # SSE streaming for native chat
  location /api/v1/ai/chat/stream {
    proxy_pass http://ai_hub_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        '';
    proxy_read_timeout 86400s;
    proxy_buffering off;
    add_header X-Accel-Buffering no always;
  }

  # ─── Knowledge Engine (:8002) ───
  location /api/v1/knowledge/harvester/ {
    proxy_pass http://knowledge_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  location /api/v1/knowledge/ {
    proxy_pass http://knowledge_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # SSE streaming for knowledge RAG
  location /api/v1/knowledge/rag {
    proxy_pass http://knowledge_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        '';
    proxy_read_timeout 300s;
    proxy_buffering off;
    add_header X-Accel-Buffering no always;
  }

  # ─── News Aggregator (:8005) ───
  location /api/v1/news/ {
    proxy_pass http://news_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── Video Analysis (:8006) ───
  location /api/v1/video-analysis/ {
    proxy_pass http://video_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # ─── Livestream Analysis (:8007) ───
  location /api/v1/livestream-analysis/ {
    proxy_pass http://livestream_upstream;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    client_max_body_size 2048M;
  }
}
