# Omni-Vibe OS Ultra — 统一编排
# 一键启动：docker-compose up -d
# 单独启动基础设施：docker-compose up -d postgres redis nginx
# 查看日志：docker-compose logs -f <service>
#
# VPN/代理配置：在根目录 .env 中设置 PROXY_URL（不要改这个文件）
#   PROXY_URL=http://host.docker.internal:12334
# 不使用代理则留空即可。

# 容器内代理：优先 .env 中的 HTTP_PROXY/HTTPS_PROXY；否则用统一 PROXY_URL。
# 切勿使用 127.0.0.1:端口 —— 在容器内指向容器自身，会导致 Connection refused (111)。
# Clash 混合端口示例：PROXY_URL=http://host.docker.internal:12334
x-proxy-env: &proxy-env
  HTTP_PROXY: "${HTTP_PROXY:-${PROXY_URL:-}}"
  HTTPS_PROXY: "${HTTPS_PROXY:-${PROXY_URL:-${HTTP_PROXY:-}}}"
  http_proxy: "${HTTP_PROXY:-${PROXY_URL:-}}"
  https_proxy: "${HTTPS_PROXY:-${PROXY_URL:-${HTTP_PROXY:-}}}"
  NO_PROXY: "localhost,127.0.0.1,omni-postgres,omni-redis,omni-frontend,omni-knowledge-engine,omni-news-aggregator,omni-video-analysis,omni-livestream-analysis,omni-ad-review,ai-provider-hub,knowledge-engine,news-aggregator,video-analysis,livestream-analysis,ad-review-service,frontend,postgres,redis"
  no_proxy: "localhost,127.0.0.1,omni-postgres,omni-redis,omni-frontend,omni-knowledge-engine,omni-news-aggregator,omni-video-analysis,omni-livestream-analysis,omni-ad-review,ai-provider-hub,knowledge-engine,news-aggregator,video-analysis,livestream-analysis,ad-review-service,frontend,postgres,redis"

services:
  # ═══ Infrastructure ═══

  postgres:
    build:
      context: ./services/infra-core/postgres
    container_name: omni-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-omni_vibe_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/infra-core/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni_user} -d ${POSTGRES_DB:-omni_vibe_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omni-network

  redis:
    image: redis:7-alpine
    container_name: omni-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:-changeme_redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./services/infra-core/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme_redis} ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omni-network

  nginx:
    image: nginx:1.27-alpine
    container_name: omni-nginx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      frontend:
        condition: service_started
      ai-provider-hub:
        condition: service_started
      knowledge-engine:
        condition: service_started
      news-aggregator:
        condition: service_started
      video-analysis:
        condition: service_started
      livestream-analysis:
        condition: service_started
      ad-review-service:
        condition: service_started
      identity-service:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./services/infra-core/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/infra-core/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - omni-network

  # ═══ Application Services ═══

  identity-service:
    build:
      context: ./services/identity-service
    container_name: omni-identity-service
    env_file:
      - ./services/identity-service/.env.example
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_redis}@omni-redis:6379/3"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-network

  frontend:
    build:
      context: ./frontend
    container_name: omni-frontend
    environment:
      NEXT_PUBLIC_USE_BACKEND_HUB: "true"
      NEXT_PUBLIC_OPENAI_BASE_URL: "http://localhost:8001/v1"
      NEXT_PUBLIC_OMNI_API_BASE_URL: "http://localhost"
      AI_PROVIDER_HUB_URL: "http://ai-provider-hub:8001"
      KNOWLEDGE_ENGINE_URL: "http://knowledge-engine:8002"
      VIDEO_ANALYSIS_SERVICE_URL: "http://video-analysis:8006"
      LIVESTREAM_ANALYSIS_SERVICE_URL: "http://livestream-analysis:8007"
      NEWS_AGGREGATOR_URL: "http://news-aggregator:8005"
      AD_REVIEW_SERVICE_URL: "http://ad-review-service:8008"
    command: ["npm", "run", "start"]
    ports:
      - "3000:3000"
    depends_on:
      - ai-provider-hub
      - knowledge-engine
      - ad-review-service
    networks:
      - omni-network

  ad-review-service:
    build:
      context: ./services/ad-review-service
    container_name: omni-ad-review
    environment:
      <<: *proxy-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
      AI_HUB_URL: "http://ai-provider-hub:8001"
      KNOWLEDGE_ENGINE_URL: "http://knowledge-engine:8002"
      VIDEO_ANALYSIS_URL: "http://video-analysis:8006"
      REVIEW_MODEL: "${REVIEW_MODEL:-gemini-2.0-flash}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DATA_DIR: "/app/data"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8008"]
    ports:
      - "${AD_REVIEW_PORT:-8008}:8008"
    expose:
      - "8008"
    volumes:
      - ad_review_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-provider-hub:
        condition: service_started
      knowledge-engine:
        condition: service_started
      video-analysis:
        condition: service_started
    networks:
      - omni-network

  ai-provider-hub:
    build:
      context: ./services/ai-provider-hub
    container_name: omni-ai-provider-hub
    env_file:
      - ./services/ai-provider-hub/.env.example
    environment:
      <<: *proxy-env
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_redis}@omni-redis:6379/0"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    expose:
      - "8001"
    volumes:
      - ai_hub_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-network

  knowledge-engine:
    image: omni-knowledge-engine:latest
    build:
      context: ./services/knowledge-engine
    container_name: omni-knowledge-engine
    shm_size: '512m'
    env_file:
      - ./services/knowledge-engine/.env.example
    environment:
      <<: *proxy-env
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_redis}@omni-redis:6379/1"
      VIDEO_ANALYSIS_SERVICE_URL: "http://video-analysis:8006"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    expose:
      - "8002"
    volumes:
      - knowledge_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-network

  news-aggregator:
    build:
      context: ./services/news-aggregator
    container_name: omni-news-aggregator
    env_file:
      - ./services/news-aggregator/.env.example
    environment:
      <<: *proxy-env
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme_redis}@omni-redis:6379/2"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005"]
    expose:
      - "8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-provider-hub:
        condition: service_started
      knowledge-engine:
        condition: service_started
    networks:
      - omni-network

  video-analysis:
    build:
      context: ./services/video-analysis
    container_name: omni-video-analysis
    env_file:
      - ./services/video-analysis/.env.example
    environment:
      <<: *proxy-env
      AI_PROVIDER_HUB_URL: "http://ai-provider-hub:8001"
      KNOWLEDGE_ENGINE_URL: "http://knowledge-engine:8002"
      KNOWLEDGE_TARGET_KB_ID: "default"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8006"]
    expose:
      - "8006"
    volumes:
      - video_analysis_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      ai-provider-hub:
        condition: service_started
    networks:
      - omni-network

  livestream-analysis:
    build:
      context: ./services/livestream-analysis
    container_name: omni-livestream-analysis
    env_file:
      - ./services/livestream-analysis/.env.example
    environment:
      <<: *proxy-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-omni_user}:${POSTGRES_PASSWORD:-changeme_in_production}@omni-postgres:5432/${POSTGRES_DB:-omni_vibe_db}"
      AI_PROVIDER_HUB_URL: "http://ai-provider-hub:8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8007"]
    expose:
      - "8007"
    volumes:
      - livestream_analysis_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      ai-provider-hub:
        condition: service_started
    networks:
      - omni-network

volumes:
  postgres_data:
  redis_data:
  ai_hub_data:
  knowledge_data:
  video_analysis_data:
  livestream_analysis_data:
  ad_review_data:

networks:
  omni-network:
    name: omni-network
    driver: bridge
